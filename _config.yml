# The Site Configuration
theme: jekyll-theme-chirpy
lang: ko-KR
timezone: Asia/Seoul

# --------------------------
# 제목 및 사이드바 설정 (특수문자 충돌 방지를 위해 따옴표 사용)
title: "asdfg0119"
tagline: "Deep dive into LLM, NLP, CS, and DevOps.<br><img src='https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https://asdfg0119.github.io' alt='Hits'>"

# '&' 기호는 YAML에서 예약어이므로 반드시 따옴표로 감싸야 합니다.
description: "LLM & Agent, NLP Research, Computer Science, Infra & DevOps를 주제로 기술적 통찰과 구현 가이드를 기록하는 공간입니다."

url: "https://asdfg0119.github.io"

github:
  username: asdfg0119

social:
  name: asdfg0119
  email: gns3216@naver.com
  links:
    - https://github.com/asdfg0119

# --------------------------
# 분석 및 기타 설정
analytics:
  google:
    id: "G-CFVRJ0YNVZ"
  busuanzi:
    enabled: true
  type: 'google'

avatar: "https://github.com/asdfg0119.png"
paginate: 10
baseurl: ""

# 이 아래는 테마 기본 설정 (건드리지 마세요)
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
